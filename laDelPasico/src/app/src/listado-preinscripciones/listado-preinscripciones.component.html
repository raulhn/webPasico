<legend>Preinscripciones</legend>
<div class="container pt-4">
  @if (bCargadoPreinscripciones) {
    <div>
      @if(bCargadoPreinscripciones){
      <app-datatable
        [$cabeceras]="cabeceras"
        [$lista]="$lista_preinscripcion()"
        [$identificador]="$id_tabla_preinscripciones()"
      ></app-datatable>}
      @if (bCargadoPreinscripciones2) {
        <div>
          <table
            datatable
            [dtOptions]="dtOptions_3"
            class="row-border hover"

          ></table>
          <table
            datatable
            [dtOptions]="dtOptions_2"
            class="row-border hover"
            id="tabla_preinscripciones_2"
          ></table>
        </div>
      }
    </div>
  }
