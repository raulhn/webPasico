@if (esAdministrador) {
  <div class="container">
    @if (!insert) {
      <button
        type="button"
        class="btn"
    style="
      background-color: rgb(14, 49, 14);
      border-width: 2px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    "
        (click)="add()"
        >
        <div class="row">
          <div class="col" style="float: center">
            <fa-icon style="color: white" [icon]="faAdd"></fa-icon>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <span style="color: white">Añade un nuevo componente</span>
          </div>
        </div>
      </button>
    }
    @if (insert) {
      <div class="container borde_gris borde_azul" id="div_selector">
        <div class="row">
          <div class="col">
            <button
          style="
            float: right;
            color: rgb(119, 23, 23);
            border-color: rgb(119, 23, 23);
            background-color: white;
            border-style: solid;
          "
              type="button"
              class="btn"
              (click)="cancelar()"
              >
              <fa-icon [icon]="faXmark"></fa-icon>
            </button>
            <button
          style="
            float: right;
            color: rgb(14, 49, 14);
            border-color: rgb(14, 49, 14);
            background-color: white;
            border-style: solid;
          "
              type="button"
              class="btn"
              (click)="guardar()"
              >
              <fa-icon [icon]="faSave"></fa-icon>
            </button>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <select class="form-select" [(ngModel)]="desplegable">
              <option value="1">Componente texto</option>
              <option value="2">Componente imagen</option>
              <option value="4">Componente video</option>
              <option value="9">Componente card</option>
            </select>
          </div>
        </div>
        <!-- Datos especificos componente de imagen -->
        @if (desplegable == '2') {
          <div class="row">
            <label>Titulo</label> <input type="text" [(ngModel)]="titulo_imagen" />
          </div>
        }
        <!-- Datos especificos componente de componentes -->
        @if (desplegable == '3') {
          <div>
            <label>Número de columnas</label>
            <input type="text" [(ngModel)]="num_columnas" />
          </div>
        }
        <!-- Datos especificos componente de video -->
        @if (desplegable == '4') {
          <div>
            <label>Url</label> <input type="text" [(ngModel)]="url" />
          </div>
        }
      </div>
    }
  </div>
}
