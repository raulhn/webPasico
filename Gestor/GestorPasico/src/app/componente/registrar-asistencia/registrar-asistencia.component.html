@if (bCargadosMusicos) {
  <div>
    <app-appdatatable
      [$cabeceras]="cabecera_tabla_musicos"
      [$lista]="$lista_musicos()"
      [$identificador]="$id_tabla_musicos()"
    ></app-appdatatable>

    @if (musico_seleccionado !== undefined) {
      <div class="float-end p-3">
        <a [href]="add_asistente()">
          <button class="btn btn-primary">Ver Ficha</button></a
        >
      </div>
    }
  </div>
}
