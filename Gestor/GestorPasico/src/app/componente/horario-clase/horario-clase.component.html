<app-menu class=""></app-menu>
<div class="container">
  <div class="row form-row">
    <div class="col">
      <label>Alumnos:</label>
      <ng-select
        [items]="alumnos_sin_asingar"
        bindLabel="etiqueta"
        bindValue="nid_matricula_asignatura"
        [(ngModel)]="nid_matricula_asignatura_seleccionada"
        [compareWith]="comparePersona"
      >
      </ng-select>
    </div>

    <button class="btn btn-primary" (click)="asignar_clase()">
      Asignar Clase
    </button>

    @if (bCargadoPersonas) {
      <div>
        <app-appdatatable
          [$cabeceras]="cabecera_alumnos"
          [$lista]="$alumnos()"
          [$identificador]="$id_tabla_alumnos()"
          (rowSelected)="click_persona($event)"
        ></app-appdatatable>
      </div>
    }
    @if (nid_matricula_asignatura_tabla != "") {
      <div>
        <button class="btn btn-primary" (click)="liberar_clase()">
          Liberar Clase
        </button>
      </div>
    }
  </div>
</div>
