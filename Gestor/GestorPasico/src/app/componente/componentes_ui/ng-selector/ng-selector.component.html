<div style="padding: 20px">
  <h1>Selector</h1>
  <div class="selector">
    <input
      [(ngModel)]="entrada"
      (input)="filtrarOpciones()"
      (focus)="onActivar()"
      (blur)="onDesactivar()"
    />
  </div>
  <div class="opciones" *ngIf="isFocus">
    @if (isFocus) {
      @for (opcion of opcionesFiltradas; track opcion.etiqueta) {
        <div class="opcion" (click)="seleccionarOpcion(opcion)">
          {{ opcion.etiqueta }}
        </div>
      }
    }
  </div>
  <span> Texto </span>
</div>
