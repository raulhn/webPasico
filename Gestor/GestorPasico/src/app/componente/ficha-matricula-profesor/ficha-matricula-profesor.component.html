<app-menu></app-menu>

<div class="container">
  <div>
    <app-appdatatable
      [$cabeceras]="cabecera_asignaturas"
      [$lista]="$lista_asignaturas()"
      [$identificador]="$id_tabla_asignaturas()"
    ></app-appdatatable>
  </div>

  <div clas="card">
    <div class="card-header">
      <b>Boletin</b>
    </div>
    <button
      class="form-control"
      class="btn btn-primary mb-2 mt-2 tp-3"
      (click)="generar_boletin()"
    >
      Generar Boletín
    </button>
  </div>

  @if (bCargadasEvaluciones) {
    <div class="card mt-4">
      <div class="card-header">
        <b>Evaluaciones</b>
      </div>
      <app-appdatatable
        [$cabeceras]="cabecera_evaluaciones"
        [$lista]="$evaluaciones()"
        [$identificador]="$id_tabla_evaluaciones()"
      ></app-appdatatable>
      <div class="mb-1 mt-1" style="display: none">
        <div #instancia_sustituir>
          <div style="min-height: 300px">
            @if (bCargadosTrimestres) {
              <div class="m-2">
                <label for="select-trimestres"> <b> Trimestre </b></label>
                <ng-select
                  id="select-trimestres"
                  [items]="lista_trimestres"
                  bindLabel="descripcion"
                  bindValue="nid_trimestre"
                  [(ngModel)]="trimestre_seleccionado"
                  [compareWith]="compareTrimestre"
                >
                </ng-select>
              </div>
            }
          </div>
        </div>
      </div>
    </div>
  }
</div>
