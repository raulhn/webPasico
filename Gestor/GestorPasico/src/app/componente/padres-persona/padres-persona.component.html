<div class="mb-1 mt-1">
  <form ngNativeValidate class="form-control">
    <legend>Padre</legend>
    <div class="row form-row">
      <div class="col">
        @if (bCargado && bCargadoPadre) {
          <ng-select
            [items]="lista_personas"
            bindLabel="etiqueta"
            bindValue="nid"
            [(ngModel)]="padre"
            [compareWith]="comparePersona_padre"
          >
          </ng-select>
        }
      </div>
    </div>
    @if (existePadre()) {
      <div class="row form-row">
        <div class="col">
          <a
            class="btn btn-primary"
            [href]="obtenerEnlaceFicha()"
            role="button"
          >
            Ver Ficha</a
          >
        </div>
      </div>
    }
  </form>
  @if (bError) {
    <div class="alert alert-danger" role="alert">
      {{ mensaje_error }}
    </div>
  }
  @if (bRegistrado) {
    <div class="alert alert-success" role="alert">
      {{ mensaje_registro }}
    </div>
  }
</div>
