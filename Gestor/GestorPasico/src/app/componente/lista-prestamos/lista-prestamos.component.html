<app-menu class=""></app-menu>
<div class="container card mt-3">
  <div class="card-header">
    <legend>Lista de préstamos</legend>
  </div>
  <div class="mt-3">
    <app-appdatatable
      [$cabeceras]="cabeceras_tabla_prestamos"
      [$lista]="$prestamos()"
      [$identificador]="$id_tabla_prestamos()"
      (rowSelected)="click_prestamo($event)"
    ></app-appdatatable>

    @if (prestamo_seleccionado != "") {
      <div class="float-end p-3">
        <a [href]="obtener_url_ficha_prestamo()">
          <button class="btn btn-primary">Ver Préstamo</button></a
        >
        <button class="btn btn-danger ms-3" (click)="dar_de_baja_prestamo()">
          Eliminar Préstamo
        </button>
      </div>
    }
  </div>
</div>
