@if (bCargado && hijos.length > 0) {
  <div class="card">
    <legend>Hijos</legend>
    <ul class="list-group">
      @for (hijo of hijos; track hijo) {
        <li class="list-group-item">
          {{hijo.etiqueta}}
          <a [href]="enlaceFicha + hijo.nid"> <button class="btn btn-primary float-end"> Ver Ficha</button></a>
        </li>
      }
    </ul>
  </div>
}
